<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Processing Payment...</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'JetBrains Mono', monospace; background-color: #ffffff; color: #111; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; text-align: center; }
        .container { max-width: 400px; padding: 20px; }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(128,128,128,0.1); border-top: 4px solid #333; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .btn { display: none; margin-top: 15px; padding: 14px 24px; background: rgba(128, 128, 128, 0.15); color: #000; border: none; border-radius: 12px; font-family: inherit; font-size: 1rem; font-weight: 600; cursor: pointer; text-decoration: none; transition: all 0.3s; }
        .btn:hover { background: rgba(128, 128, 128, 0.3); }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner" id="spinner"></div>
        <h2 id="statusText">Verifying your payment...</h2>
        <p style="color:#666; font-size:0.85rem; margin-top:10px;" id="subText">Please do not close this page.</p>
        
        <a href="#" class="btn" id="botBtn" target="_blank">Step 1: Activate Bot Account</a>
        <a href="#" class="btn" id="groupBtn" target="_blank">Step 2: Join Telegram Group</a>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);

        // Chargily appends ?checkout_id=<id> to the back_url after payment.
        // We also accept ?invoice=<id> as a legacy fallback.
        const invoiceId = urlParams.get('checkout_id') || urlParams.get('invoice');

        if (!invoiceId) {
            document.getElementById('statusText').innerText = "Error: Payment reference not found.";
            document.getElementById('subText').innerText   = "Please contact support if you completed a payment.";
            document.getElementById('spinner').style.display = 'none';
        } else {
            let attempts = 0;
            const maxAttempts = 40; // poll for up to ~2 minutes

            const interval = setInterval(async () => {
                attempts++;
                try {
                    const res  = await fetch(`/api/check-payment/${invoiceId}`);
                    const data = await res.json();

                    if (data.success) {
                        clearInterval(interval);
                        document.getElementById('spinner').style.display = 'none';
                        document.getElementById('statusText').innerText  = "Payment Successful! 🎉";
                        document.getElementById('subText').innerText     = "Complete steps 1 and 2 below:";

                        document.getElementById('botBtn').href         = data.botLink;
                        document.getElementById('botBtn').style.display = 'block';

                        document.getElementById('groupBtn').href         = data.groupLink;
                        document.getElementById('groupBtn').style.display = 'block';
                    } else if (attempts >= maxAttempts) {
                        clearInterval(interval);
                        document.getElementById('spinner').style.display = 'none';
                        document.getElementById('statusText').innerText  = "Taking longer than expected.";
                        document.getElementById('subText').innerText     = "If you paid, please contact support — your access will be granted shortly.";
                    }
                } catch (e) {
                    console.error("Polling error", e);
                }
            }, 3000);
        }
    </script>
</body>
</html>
